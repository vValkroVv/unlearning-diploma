defaults:
  - finetune

handler: UNDIAL # corresponds to src/trainer/unlearn/undial.py
args: # HuggingFace TrainingArguments
  learning_rate: 1e-4
  num_train_epochs: 5
method_args: # Your own method-specific arguments
  gamma: 1.0
  alpha: 0.0
  beta: 3.0 # UNDIAL adjusted-logit penalty for memorized tokens
  retain_loss_type: NLL 
