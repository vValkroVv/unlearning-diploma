# @package eval.duet.metrics.holdout_qa_rouge
defaults:
  - ../../data/datasets@datasets: POPQA_QA_holdout
  - ../../collator@collators: DataCollatorForSupervisedDatasetwithIndex
  - ../../generation@generation_args: default

handler: rouge
rouge_type: rougeL_recall
batch_size: ${eval.duet.batch_size}

generation_args:
  max_new_tokens: 64

datasets:
  POPQA_QA_holdout:
    args:
      hf_args:
        split: ${eval.duet.holdout_split}
      question_key: ${eval.duet.question_key}
      predict_with_generate: True
collators:
  DataCollatorForSupervisedDataset:
    args:
      padding_side: left
