# @package _global_

defaults:
  - override /model: Llama-3.1-8B-Instruct-lora
  - override /trainer: BoundaryCF
  - override /data: unlearn
  - override /data/datasets@data.forget: DUET_QA_forget_boundary_cf
  - override /data/datasets@data.retain: DUET_QA_retain
  - override /eval: duet

forget_split: city_forget_rare_5
retain_split: city_fast_retain_500
holdout_split: ${retain_split}
retain_logs_path: null
question_key: question

cf_dataset_path: json
cf_dataset_split: train
cf_dataset_data_files: null

data:
  anchor: forget
  forget:
    DUET_QA_forget_boundary_cf:
      args:
        hf_args:
          path: ${cf_dataset_path}
          split: ${cf_dataset_split}
          data_files: ${cf_dataset_data_files}
        question_key: ${question_key}
  retain:
    DUET_QA_retain:
      args:
        hf_args:
          path: SwetieePawsss/DUET
          split: ${retain_split}
        question_key: ${question_key}

eval:
  duet:
    forget_split: ${forget_split}
    holdout_split: ${holdout_split}
    retain_logs_path: ${retain_logs_path}
    question_key: ${question_key}

trainer:
  args:
    per_device_train_batch_size: 1
    gradient_accumulation_steps: 32
    learning_rate: 1e-5
    num_train_epochs: 5
    lr_scheduler_type: constant
    warmup_ratio: 0.1
    logging_steps: 10
    logging_strategy: steps
    eval_strategy: "no"
    save_strategy: "no"
    do_eval: false
    eval_on_start: false
    remove_unused_columns: false
    gradient_checkpointing: false
    ddp_find_unused_parameters: false

task_name: duet_boundary_cf_lora
