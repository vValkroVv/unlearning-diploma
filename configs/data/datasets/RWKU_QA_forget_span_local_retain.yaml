RWKU_QA_forget_span_local_retain:
  handler: QABoundaryCFDataset
  args:
    hf_args:
      path: ${cf_dataset_path}
      name: ${cf_dataset_name}
      split: ${cf_dataset_split}
      data_files: ${cf_dataset_data_files}
    question_key: ${question_key}
    answer_key: "answer"
    alternate_key: "alternate"
    metadata_keys:
      - difficulty_score
      - attribution_score
      - boundary_score
      - index
    optional_metadata_keys:
      - rarity_score
    local_retain_question_key: "local_retain_question"
    local_retain_answer_key: "local_retain_answer"
    local_retain_index_key: "local_retain_index"
    return_original: true
    max_length: 512
