DUET_QA_forget_multicf:
  handler: QAMultiCFDataset
  args:
    hf_args:
      path: ${cf_dataset_path}
      split: ${cf_dataset_split}
      data_files: ${cf_dataset_data_files}
    question_key: ${question_key}
    answer_key: "answer"
    alternate_key: "alternate"
    alternate_set_key: "alternate_set"
    alternate_weights_key: "alternate_set_weights"
    metadata_keys:
      - difficulty_score
      - attribution_score
      - index
    optional_metadata_keys:
      - rarity_score
    return_original: true
    max_alternates: 8
    normalize_alternate_weights: false
    max_length: 512
